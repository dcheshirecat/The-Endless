name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      # Force Node.js 24 to avoid deprecation warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1️⃣ Checkout repository
      - uses: actions/checkout@v4

      # 2️⃣ Install Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Install Android SDK correctly
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          # Debug: list installed tools
          ls -lh $ANDROID_SDK_ROOT
          ls -lh $ANDROID_SDK_ROOT/platform-tools
          ls -lh $ANDROID_SDK_ROOT/build-tools

      # 4️⃣ Download Godot Linux binary
      - name: Download Godot
        run: |
          wget -4 https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip -O Godot.zip
          unzip -q Godot.zip
          chmod +x Godot_v4.2.1-stable_linux.x86_64

      # 5️⃣ Install Godot export templates
      - name: Install Export Templates
        run: |
          wget -4 https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable
          unzip -q templates.tpz -d ~/.local/share/godot/export_templates/4.2.1.stable

      # 6️⃣ Create debug keystore
      - name: Create Android Debug Keystore
        run: |
          keytool -genkeypair -v -keystore debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Godot, OU=Godot, O=Godot, L=Earth, S=Earth, C=US"

      # 7️⃣ Export APK
      - name: Export APK
        env:
          ANDROID_HOME: $HOME/android-sdk
          ANDROID_SDK_ROOT: $HOME/android-sdk
          PATH: $HOME/android-sdk/platform-tools:$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
        run: |
          ./Godot_v4.2.1-stable_linux.x86_64 --headless \
            --export-release "Android" $GITHUB_WORKSPACE/build.apk
          # Check that APK exists
          if [ ! -f "$GITHUB_WORKSPACE/build.apk" ]; then
            echo "ERROR: APK was not generated!"
            exit 1
          fi
          ls -lh $GITHUB_WORKSPACE

      # 8️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: endless-apk
          path: $GITHUB_WORKSPACE/build.apk
