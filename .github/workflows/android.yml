name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - uses: actions/checkout@v4

      # 2️⃣ Install Godot 4.2.1
      - name: Setup Godot
        uses: firebelley/setup-godot@v1
        with:
          godot-version: 4.2.1

      # 3️⃣ Ensure export templates exist (required for Android)
      - name: Install Godot Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable
          wget -q https://downloads.tuxfamily.org/godotengine/4.2.1/Godot_v4.2.1-stable_export_templates.tpz -O templates.tpz
          unzip -q templates.tpz -d ~/.local/share/godot/export_templates/4.2.1.stable

      # 4️⃣ Export APK
      - name: Export Android APK
        run: |
          godot --headless --export-release "Android" build.apk

      # 5️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: endless-apk
          path: build.apk
