name: Build Godot Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Godot ${{ vars.GODOT_VERSION }}
        run: |
          GODOT_VERSION="${{ vars.GODOT_VERSION }}"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Godot Android export templates
        run: |
          GODOT_VERSION="${{ vars.GODOT_VERSION }}"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATE_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "$TEMPLATE_DIR/"
          echo "Templates installed to $TEMPLATE_DIR"

      - name: Set up Godot Android SDK path
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings"]

          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          EOF

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
          echo "Keystore decoded successfully"

      - name: Create export directory
        run: mkdir -p build/android

      - name: Export APK (Release)
        run: |
          godot --headless --export-release "Android" "$(pwd)/build/android/game.apk" 2>&1
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: /tmp/release.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.KEY_ALIAS }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Verify APK was created
        run: |
          if [ -f "build/android/game.apk" ]; then
            echo "✅ APK built successfully!"
            ls -lh build/android/game.apk
          else
            echo "❌ APK not found!"
            exit 1
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: build/android/game.apk
          retention-days: 30
